services:
  - type: web
    name: railway-exam-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL_ENV
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: PROJECT_NAME
        value: "Railway Exam Production"
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: SENDER_EMAIL
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: BACKEND_CORS_ORIGINS
        sync: false
